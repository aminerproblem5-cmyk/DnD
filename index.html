<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Nexus - Login</title>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <h1 class="logo">🎲 D&D Nexus</h1>
        
        <div id="login-box" class="auth-box">
            <h2>Welcome Back, Adventurer</h2>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email Address" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="btn-primary">Enter the Tavern</button>
            </form>
            <p>New to the realm? <a href="#" id="to-register">Create an Account</a></p>
        </div>

        <div id="register-box" class="auth-box hidden">
            <h2>Begin Your Journey</h2>
            <form id="register-form">
                <input type="text" id="reg-username" placeholder="Display Name / DM Name" required>
                <input type="email" id="reg-email" placeholder="Email Address" required>
                <input type="password" id="reg-password" placeholder="Password (Min 6 characters)" required>
                <button type="submit" class="btn-primary">Sign Up</button>
            </form>
            <p>Already registered? <a href="#" id="to-login">Log In</a></p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script src="js/firebase-config.js"></script>
    
    <script src="js/auth.js"></script>
</body>
</html>
